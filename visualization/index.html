<!DOCTYPE html>
<html>
<head>
    <title>Disk Scheduling Visualization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<h2>Disk Scheduling Visualization</h2>

<div class="controls">
    <input id="head" placeholder="Initial Head (e.g. 50)" />
    <input id="requests" placeholder="Requests (e.g. 82,140,170,190,43,24,16)" />

    <br>

    <button onclick="run('scan')">Run SCAN</button>
    <button onclick="run('cscan')">Run C-SCAN</button>
</div>

<canvas id="canvas" width="900" height="400"></canvas>

<div id="info"></div>
<script src="script.js"></script>
</body>
</html>
